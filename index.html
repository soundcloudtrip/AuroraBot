<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Dating Oracle</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Экран загрузки -->
        <div id="splash-screen" class="splash-screen">
            <div class="splash-content">
                <div class="logo-animation">
                    <span class="logo-emoji">🔮</span>
                </div>
                <h1>AI Dating Oracle</h1>
                <p class="splash-subtitle">Твой личный оракул любви</p>
                <div class="loader"></div>
            </div>
        </div>

        <!-- Основной интерфейс -->
        <div id="main-app" class="main-app hidden">
            <!-- Шапка -->
            <header class="header">
                <div class="header-left">
                    <button class="menu-btn" id="menuBtn">☰</button>
                </div>
                <div class="header-center">
                    <span class="header-title">🔮 Oracle</span>
                </div>
                <div class="header-right">
                    <button class="profile-btn" id="profileBtn">
                        <span class="profile-avatar">👤</span>
                    </button>
                </div>
            </header>

            <!-- Боковое меню -->
            <div id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">👤</div>
                        <div class="user-details">
                            <span class="user-name" id="userName">Загрузка...</span>
                            <span class="user-status" id="userStatus">🆓 Бесплатный</span>
                        </div>
                    </div>
                </div>
                <nav class="sidebar-nav">
                    <button class="nav-item active" data-page="home">
                        <span class="nav-icon">🏠</span>
                        <span>Главная</span>
                    </button>
                    <button class="nav-item" data-page="oracle">
                        <span class="nav-icon">🌙</span>
                        <span>Оракул дня</span>
                    </button>
                    <button class="nav-item" data-page="compatibility">
                        <span class="nav-icon">💑</span>
                        <span>Совместимость</span>
                    </button>
                    <button class="nav-item" data-page="chat">
                        <span class="nav-icon">💬</span>
                        <span>Разбор чата</span>
                    </button>
                    <button class="nav-item" data-page="flirt">
                        <span class="nav-icon">✨</span>
                        <span>Флирт-генератор</span>
                    </button>
                    <button class="nav-item" data-page="premium">
                        <span class="nav-icon">⭐</span>
                        <span>Премиум</span>
                    </button>
                    <button class="nav-item" data-page="profile">
                        <span class="nav-icon">👤</span>
                        <span>Профиль</span>
                    </button>
                    <button class="nav-item" data-page="referral">
                        <span class="nav-icon">🔗</span>
                        <span>Рефералы</span>
                    </button>
                </nav>
                <div class="sidebar-footer">
                    <button class="nav-item" id="closeSidebarBtn">
                        <span class="nav-icon">✕</span>
                        <span>Закрыть</span>
                    </button>
                </div>
            </div>

            <!-- Затемнение фона при открытом меню -->
            <div id="sidebarOverlay" class="sidebar-overlay"></div>

            <!-- Основной контент -->
            <main class="content" id="content">
                <!-- Контент будет загружаться динамически -->
            </main>

            <!-- Нижняя навигация (для мобильных) -->
            <nav class="bottom-nav">
                <button class="bottom-nav-item active" data-page="home">
                    <span class="bottom-nav-icon">🏠</span>
                    <span class="bottom-nav-label">Главная</span>
                </button>
                <button class="bottom-nav-item" data-page="oracle">
                    <span class="bottom-nav-icon">🌙</span>
                    <span class="bottom-nav-label">Оракул</span>
                </button>
                <button class="bottom-nav-item" data-page="compatibility">
                    <span class="bottom-nav-icon">💑</span>
                    <span class="bottom-nav-label">Совместимость</span>
                </button>
                <button class="bottom-nav-item" data-page="chat">
                    <span class="bottom-nav-icon">💬</span>
                    <span class="bottom-nav-label">Чат</span>
                </button>
                <button class="bottom-nav-item" data-page="flirt">
                    <span class="bottom-nav-icon">✨</span>
                    <span class="bottom-nav-label">Флирт</span>
                </button>
            </nav>

            <!-- Модальные окна -->
            <div id="modal" class="modal hidden">
                <div class="modal-content">
                    <button class="modal-close" id="modalClose">✕</button>
                    <div id="modalBody" class="modal-body"></div>
                </div>
            </div>

            <!-- Уведомления -->
            <div id="toast" class="toast hidden"></div>
        </div>
    </div>

    <!-- Telegram Web App скрипт -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
</body>
</html>
